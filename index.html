<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Voz de Brasília</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">

<nav class="fixed top-0 w-full bg-gray-900/90 p-4">
    <div class="container mx-auto flex justify-between">
        <h1 class="text-2xl font-bold text-yellow-500">TV VOZ DE BRASÍLIA</h1>
        <div class="space-x-4">
            <a href="#inicio" class="hover:text-yellow-500">Início</a>
            <a href="#categorias" class="hover:text-yellow-500">Categorias</a>
            <a href="tv-ao-vivo.html" class="text-yellow-500 font-bold">TV Ao Vivo</a>
        </div>
    </div>
</nav>

<section id="inicio" class="min-h-screen flex items-center justify-center pt-20">
    <div class="container mx-auto px-6 text-center">
        <h1 class="text-5xl md:text-7xl font-bold mb-6">
            A maior <span class="text-yellow-500">vitrine empresarial</span> de Brasília
        </h1>
        <p class="text-xl text-gray-300 mb-8">40 anos de história</p>
    </div>
</section>

<section id="categorias" class="py-20 px-6">
    <div class="container mx-auto">
        <h2 class="text-4xl font-bold text-center mb-12">Assista por Categoria</h2>
        
        <div class="grid md:grid-cols-3 gap-6 max-w-5xl mx-auto">
            <!-- EMPRESARIAL - DESTAQUE -->
            <a href="tv-ao-vivo.html" class="block p-8 rounded-2xl bg-yellow-500/20 border-4 border-yellow-500 hover:scale-105 transition">
                <div class="text-5xl mb-4">🏢</div>
                <h3 class="text-2xl font-bold text-yellow-400 mb-2">EMPRESARIAL</h3>
                <p class="text-gray-300">Entrevistas com empresários e CEOs</p>
                <button class="mt-4 px-6 py-2 bg-yellow-500 text-gray-900 rounded-full font-bold">
                    Assistir →
                </button>
            </a>

            <!-- POLÍTICA -->
            <a href="tv-ao-vivo.html" class="block p-8 rounded-2xl bg-gray-800 border-2 border-gray-600 hover:border-blue-500 hover:scale-105 transition">
                <div class="text-5xl mb-4">🏛️</div>
                <h3 class="text-2xl font-bold mb-2">Política</h3>
                <p class="text-gray-300">Deputados, senadores e autoridades</p>
                <button class="mt-4 px-6 py-2 bg-blue-600 rounded-full font-bold">
                    Assistir →
                </button>
            </a>

            <!-- INTERNACIONAL -->
            <a href="tv-ao-vivo.html" class="block p-8 rounded-2xl bg-gray-800 border-2 border-gray-600 hover:border-purple-500 hover:scale-105 transition">
                <div class="text-5xl mb-4">🌍</div>
                <h3 class="text-2xl font-bold mb-2">Internacional</h3>
                <p class="text-gray-300">Embaixadores e representantes</p>
                <button class="mt-4 px-6 py-2 bg-purple-600 rounded-full font-bold">
                    Assistir 🌐 →
                </button>
            </a>
        </div>
    </div>
</section>

</body>
</html>
